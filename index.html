<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Suerte | Random Number Generator</title>
    <link rel="stylesheet" href="public/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="public/bootstrap/bootstrap-icons.min.css">
    <link rel="stylesheet" href="public/lightnings.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="public/favicon.jpg">
    <script defer src="public/bootstrap/bootstrap.min.js"></script>
    <script defer src="public/lightnings.js"></script>
    <script defer type="module" src="main.js"></script>
</head>
<body>
    <svg class="fixed-top z-n1" id="svgContainer"></svg>
    <main class="d-flex flex-column text-white">
        <section class="d-flex flex-column justify-content-center align-items-center mt-5 pt-5 mt-xxl-0 pt-xxl-0">
            <h1 class="scary scary-shadow display-1">La Suerte</h1>
            <form class="d-flex flex-column flex-md-row align-items-center justify-content-center gap-2 w-75">
                <div class="d-flex align-items-center gap-2">
                    <label for="numberAmt">Estrai</label>
                    <input class="form-control" placeholder="2" value="2" min="1" max="50" type="number" name="numberAmt" id="numberAmt">
                    <p class="m-0" style="min-width: max-content;">numeri nell'intervallo</p>
                </div>
                <label for="numberMin">da:</label>
                <input class="form-control w-25" type="number" value="1" placeholder="1" min="1" max="100" name="numberMin" id="numberMin">
                <label for="numberMax">a:</label>
                <input class="form-control w-25" type="number" value="30" placeholder="30" min="1" max="100" name="numberMax" id="numberMax">
                <div class="d-flex gap-3 mt-3 mt-lg-0 ms-0 ms-lg-4">
                    <a href="#suertedNumbers">
                        <button id="generateBtn" type="button" class="btn btn-danger fs-4">
                            Genera
                        </button>
                    </a>
                    <button id="resetBtn" type="button" class="btn btn-warning fs-4">
                        Reset
                    </button>
                </div>
            </form>
            <h2 class="scary mt-5">Escludendo</h2>
            <ul id="numberTable" class="d-flex flex-wrap w-100 px-5 justify-content-center gap-2"></ul>
        </section>
        <section id="suertedNumbers" class="d-flex flex-column justify-content-center align-items-center">
            <div id="suertingLoading" class="d-none position-absolute d-flex flex-column justify-content-center align-items-center">
                <h2 class="scary scary-shadow display-1 text-center">La suerte <br class="d-md-none">sta arrivando</h2>
            </div>
            <ul id="suertedNumbersTable" class="d-flex flex-row flex-wrap px-5 gap-5 justify-content-center"></ul>
        </section>
        <footer class="text-white-50 w-full text-center p-5">
            <small>By 
                <a class="text-white-50" href="https://lucacasadei.net/">L. Casadei</a> & 
                <a class="text-white-50" href="http://nicholasmagi.it">N. Magi</a> // Spice up oral exams!
            </small>
        </footer>
    </main>
</body>
</html>
